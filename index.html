<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMI SDK Public API Documentation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.75rem;
      font-size: 1.1rem;
      color: #6e6e73;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 2rem 2.5rem;
      text-align: center;
      text-decoration: none;
      color: inherit;
      width: 260px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.13);
    }

    .card .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 0.95rem;
      color: #6e6e73;
    }

    .card .badge {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 0.35rem 1rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #ffffff;
    }

    .ios .badge  { background: #0071e3; }
    .android .badge { background: #3ddc84; color: #1d1d1f; }

    footer {
      margin-top: 4rem;
      font-size: 0.85rem;
      color: #aeaeb2;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>OMI SDK – Public API Documentation</h1>
    <p>Choose a platform to explore the SDK reference.</p>
  </header>

  <main class="cards">
    <a class="card ios" href="docs/iOS/OneginiSDKiOS.doccarchive/">
      <div class="icon">🍎</div>
      <h2>iOS</h2>
      <p>Generated with Apple's DocC framework.</p>
      <span class="badge">View iOS Docs</span>
    </a>

    <a class="card android" href="docs/Android/OneginiSDKAndroid-JavaDoc/">
      <div class="icon">🤖</div>
      <h2>Android</h2>
      <p>Generated with Android's JavaDoc toolchain.</p>
      <span class="badge">View Android Docs</span>
    </a>
  </main>

  <footer>
    <p>&copy; Thales Group – OMI SDK</p>
  </footer>

</body>
</html>
